# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

format = """
$directory\
$git_branch$git_status\
$python\
$rust$golang$nodejs$java$ruby$c$kotlin$swift$dart$php$lua$zig\
${custom.progress}\
$line_break\
$character"""

[character]
success_symbol = '[ÔŞ£](bold #a6e3a1)'
error_symbol = '[ÔŞ£](bold #f38ba8)'

# integrate progress:
[custom.progress]
command = "progress -w"
when = "progress -q"
